name: 'nightly'
on:
  push:
    branches: ["main"]

jobs:
  nightly-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: pnpm install
      - name: build and fix macOS
        if: matrix.platform == 'macos-latest'
        run: |
          pnpm tauri build ${{ matrix.args }}
          pnpm run post-build:macos
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: nightly
          releaseName: 'Emerald Nightly'
          releaseBody: |
            # LCE Emerald Launcher (Nightly)
            # What to download?
            - `LCE.Emerald.Launcher-*.rpm` for GNU/Linux (RHEL)
            - `LCE.Emerald.Launcher-*.deb` for GNU/Linux (Debian+Ubuntu)
            - `LCE.Emerald.Launcher-*.AppImage` for GNU/Linux (Universal)
            - `LCE.Emerald.Launcher-*_x64.dmg` for macOS (Intel)
            - `LCE.Emerald.Launcher-*_aarch64.dmg` for macOS (M-series)
            - `LCE.Emerald.Launcher-*.exe` for Windows (Setup)
            - `LCE.Emerald.Launcher-*.msi` for Windows (Setup)
            ---
            # Windows SmartScreen
            This software is completely safe. Because the launcher is unsigned, you will see a "Windows protected your PC" window. To proceed:
            
            1. Click the **"More info"** link under the main text.
            2. Click the **"Run anyway"** button that appears.
            ---
            # macOS "Damaged" Error Fix
            The macOS builds now include automatic fixes for Gatekeeper quarantine issues. The app should launch without "application is damaged" errors.
          
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}

  nightly-flatpak:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: nightly-tauri  # Wait for Tauri release to be created
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-23.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: io.github.LCE_Emerald_Launcher.LCE_Emerald_Launcher.flatpak
          manifest-path: flatpak/io.github.LCE_Emerald_Launcher.LCE_Emerald_Launcher.yml
          cache-key: flatpak-builder-${{ github.sha }}
      - uses: softprops/action-gh-release@v2
        with:
          files: io.github.LCE_Emerald_Launcher.LCE_Emerald_Launcher.flatpak
          tag_name: nightly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
